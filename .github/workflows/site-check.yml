name: Validate portfolio

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check JavaScript syntax
        run: node --check script.js
      - name: Check required files and internal links
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          required = [
              'index.html', 'resume.html', 'styles.css', 'script.js',
              'favicon.svg', 'site.webmanifest', '404.html', '.nojekyll'
          ]
          missing = [name for name in required if not Path(name).exists()]
          if missing:
              raise SystemExit(f"Missing required files: {missing}")

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = set()
                  self.links = []
              def handle_starttag(self, tag, attrs):
                  data = dict(attrs)
                  if 'id' in data:
                      if data['id'] in self.ids:
                          raise SystemExit(f"Duplicate id: {data['id']}")
                      self.ids.add(data['id'])
                  if tag == 'a' and 'href' in data:
                      self.links.append(data['href'])

          parser = Parser()
          parser.feed(Path('index.html').read_text(encoding='utf-8'))
          broken_fragments = [link for link in parser.links if link.startswith('#') and link[1:] not in parser.ids]
          if broken_fragments:
              raise SystemExit(f"Broken in-page links: {broken_fragments}")
          print('Portfolio structure validated.')
          PY
